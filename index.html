<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D 웹 FPS 게임 (장전/조준 추가)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background-color: #000; font-family: 'Impact', sans-serif; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background-color: #00ff00;
            transition: 0.2s; /* 줌인 할 때 십자선 변화를 위함 */
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        #ui-layer {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            color: white; font-size: 30px;
            pointer-events: none; z-index: 10; text-shadow: 2px 2px 0 #000;
        }
        
        /* 오른쪽 아래 탄약 UI 표시 */
        #ammo-display {
            position: absolute; bottom: 30px; right: 40px;
            color: #FFCC00; font-size: 40px;
            pointer-events: none; z-index: 10; text-shadow: 3px 3px 0 #000;
        }

        #health { color: #ff4444; }

        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 200, 0.4);
            opacity: 0; pointer-events: none; z-index: 5;
            transition: opacity 0.05s;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; color: white;
        }
        #start-btn {
            margin-top: 20px; padding: 15px 40px; font-size: 24px; font-family: 'Impact', sans-serif;
            background-color: #FFCC00; border: none; cursor: pointer; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="flash"></div>
    <div id="crosshair"></div>
    
    <div id="ui-layer">
        <div id="score-display">SCORE: 0</div>
        <div id="health">HP: 100</div>
    </div>
    <div id="ammo-display">30 / 30</div>

    <div id="start-screen">
        <h1 style="font-size: 50px; color: #ff4444;">TACTICAL AI SHOOTER</h1>
        <p style="font-size: 20px; margin-top: 10px;">이동: WASD | 사격: 좌클릭 | 정조준: 우클릭 유지 | 장전: R키</p>
        <button id="start-btn">게임 시작 (화면 클릭)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let score = 0;
        let hp = 100;
        let ammo = 30;
        const maxAmmo = 30;
        let isPlaying = false;
        let isReloading = false;
        let isAiming = false;

        const scoreDisplay = document.getElementById('score-display');
        const healthDisplay = document.getElementById('health');
        const ammoDisplay = document.getElementById('ammo-display');
        const startScreen = document.getElementById('start-screen');
        const crosshair = document.getElementById('crosshair');
        const flash = document.getElementById('flash');

        // === 씬(Scene) & 카메라 ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 0, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 2;
        scene.add(camera); // 카메라에 무기를 부착하려면 scene에 추가해야 함

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 조명 및 바닥
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshLambertMaterial({ color: 0x4CAF50 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // === 총기 모델 만들기 (카메라에 부착) ===
        const weaponGroup = new THREE.Group();
        camera.add(weaponGroup); // 카메라 시점을 따라다니도록 설정

        // 총 몸통 (검은색 직육면체)
        const gunGeo = new THREE.BoxGeometry(0.15, 0.2, 0.8);
        const gunMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
        const gunMesh = new THREE.Mesh(gunGeo, gunMat);
        weaponGroup.add(gunMesh);

        // 총기 기본 위치 (오른쪽 아래)
        const hipPosition = new THREE.Vector3(0.3, -0.3, -0.6);
        // 정조준 위치 (화면 중앙)
        const aimPosition = new THREE.Vector3(0, -0.15, -0.5);
        
        weaponGroup.position.copy(hipPosition);

        // === 적(AI) ===
        const enemy = new THREE.Mesh(
            new THREE.BoxGeometry(2, 2, 2),
            new THREE.MeshLambertMaterial({ color: 0xff0000 })
        );
        scene.add(enemy);

        function spawnEnemy() {
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 20 + 15;
            enemy.position.set(camera.position.x + Math.cos(angle) * distance, 1, camera.position.z + Math.sin(angle) * distance);
        }
        spawnEnemy();

        // === 조작 ===
        const controls = new THREE.PointerLockControls(camera, document.body);
        document.getElementById('start-btn').addEventListener('click', () => controls.lock());

        controls.addEventListener('lock', () => {
            startScreen.style.display = 'none';
            if (hp <= 0) { hp = 100; score = 0; ammo = maxAmmo; updateUI(); spawnEnemy(); }
            isPlaying = true;
        });
        controls.addEventListener('unlock', () => {
            if (hp > 0) startScreen.style.display = 'flex';
            isPlaying = false;
        });

        const moveState = { forward: false, backward: false, left: false, right: false };
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') moveState.forward = true;
            if (e.code === 'KeyS') moveState.backward = true;
            if (e.code === 'KeyA') moveState.left = true;
            if (e.code === 'KeyD') moveState.right = true;
            
            // R키로 수동 장전
            if (e.code === 'KeyR' && ammo < maxAmmo && !isReloading) reloadWeapon();
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveState.forward = false;
            if (e.code === 'KeyS') moveState.backward = false;
            if (e.code === 'KeyA') moveState.left = false;
            if (e.code === 'KeyD') moveState.right = false;
        });

        // 우클릭으로 조준(ADS)
        document.addEventListener('mousedown', (e) => {
            if (!isPlaying) return;
            if (e.button === 2 && !isReloading) {
                isAiming = true;
                crosshair.style.opacity = '0'; // 줌 할때는 십자선 숨기기
            }
        });
        document.addEventListener('mouseup', (e) => {
            if (e.button === 2) {
                isAiming = false;
                crosshair.style.opacity = '1';
            }
        });

        // === 사격 및 장전 로직 ===
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playGunSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'shoot') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'empty') {
                // 탄창 없을 때 틱틱 소리
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        function reloadWeapon() {
            isReloading = true;
            isAiming = false; // 장전 중엔 조준 풀림
            crosshair.style.opacity = '1';
            ammoDisplay.textContent = "RELOADING...";
            ammoDisplay.style.color = "#ff4444";

            // 1.5초 후 장전 완료
            setTimeout(() => {
                ammo = maxAmmo;
                isReloading = false;
                updateUI();
            }, 1500);
        }

        const raycaster = new THREE.Raycaster();
        const center = new THREE.Vector2(0, 0);

        document.addEventListener('mousedown', (e) => {
            if (!isPlaying || e.button !== 0) return; // 좌클릭만 처리

            if (isReloading) return;
            if (ammo <= 0) {
                playGunSound('empty');
                return;
            }

            // 탄약 소모
            ammo--;
            updateUI();

            // 사격 이펙트 (반동 모션은 게임 루프에서 처리)
            playGunSound('shoot');
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 50);

            // 총기 반동(Kickback) 모션 - 총이 뒤로 순간적으로 밀림
            weaponGroup.position.z += 0.1; 
            weaponGroup.rotation.x += 0.05;

            // 판정
            raycaster.setFromCamera(center, camera);
            const intersects = raycaster.intersectObject(enemy);
            if (intersects.length > 0) {
                score += 10;
                updateUI();
                spawnEnemy();
            }

            // 총알 다 쓰면 자동 장전
            if (ammo === 0) reloadWeapon();
        });

        // 우클릭 메뉴 뜨는거 방지
        document.addEventListener('contextmenu', e => e.preventDefault());

        // === 게임 루프 ===
        const clock = new THREE.Clock();
        const speed = 15;
        const enemySpeed = 4;

        function updateUI() {
            scoreDisplay.textContent = `SCORE: ${score}`;
            healthDisplay.textContent = `HP: ${hp}`;
            ammoDisplay.textContent = `${ammo} / ${maxAmmo}`;
            ammoDisplay.style.color = "#FFCC00";
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isPlaying) return;

            const delta = clock.getDelta();

            // 부드러운 조준(ADS) 및 장전 모션 (선형 보간 - Lerp)
            // 1. 목표 위치 설정
            let targetPos = isAiming ? aimPosition : hipPosition;
            let targetFov = isAiming ? 45 : 75; // 정조준 시 시야각(FOV)이 좁아지며 줌인
            let targetRotX = 0;

            if (isReloading) {
                // 장전 중일 때는 총을 아래로 꺾어서 내림
                targetPos = new THREE.Vector3(0.3, -0.6, -0.4);
                targetRotX = -Math.PI / 4; 
            }

            // 2. 현재 위치에서 목표 위치로 부드럽게 이동 (매 프레임)
            weaponGroup.position.lerp(targetPos, 0.15);
            weaponGroup.rotation.x += (targetRotX - weaponGroup.rotation.x) * 0.15;
            
            // 카메라 줌인/아웃 부드럽게 적용
            camera.fov += (targetFov - camera.fov) * 0.15;
            camera.updateProjectionMatrix();

            // 이동
            if (moveState.forward) controls.moveForward(speed * delta);
            if (moveState.backward) controls.moveForward(-speed * delta);
            if (moveState.right) controls.moveRight(speed * delta);
            if (moveState.left) controls.moveRight(-speed * delta);

            // AI 추적
            const eTarget = new THREE.Vector3(camera.position.x, enemy.position.y, camera.position.z);
            enemy.lookAt(eTarget);
            enemy.translateZ(enemySpeed * delta);

            if (enemy.position.distanceTo(camera.position) < 2.5) {
                hp -= 20;
                updateUI();
                spawnEnemy();
                if (hp <= 0) {
                    controls.unlock();
                    document.getElementById('start-btn').textContent = "게임 오버! 다시 시작";
                    startScreen.style.display = 'flex';
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
