<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ULTIMATE PvP FPS - FINAL COMPLETE VERSION</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid lime; border-radius: 50%; transform: translate(-50%, -50%); display: none; }
        #ui { position: absolute; top: 20px; left: 20px; display: none; }
        #lobby { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #222; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #viewmodel { position: absolute; bottom: 0; right: 10%; width: 500px; height: 400px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui">
        <div id="hp">HP: 100</div>
        <div id="coins">💰 코인: 0</div>
    </div>
    <div id="viewmodel"><img id="gun-img" src="" style="width:100%"></div>

    <div id="lobby">
        <h1>ULTIMATE FPS</h1>
        <button onclick="startHost()">방 만들기 (Host)</button>
        <button onclick="startJoin()">참가하기 (Join)</button>
    </div>

    <script>
        // === 1. 설정 및 변수 ===
        let scene, camera, renderer, controls, playerMesh;
        let isPlaying = false, coins = parseInt(localStorage.getItem('coins')) || 0;
        let velocityY = 0;
        const playerHeight = 2.0;

        // === 2. 이미지 내장 데이터 (SVG) ===
        const weapons = {
            'M4A1': { img: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent('<svg viewBox="0 0 100 50"><rect x="10" y="20" width="60" height="15" fill="#333"/><rect x="70" y="22" width="20" height="5" fill="#666"/></svg>') },
            'KNIFE': { img: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent('<svg viewBox="0 0 100 50"><path d="M20 25 L80 25 L70 20 L20 20" fill="#aaa"/></svg>') }
        };

        // === 3. 엔진 초기화 (검은 화면 방지) ===
        function initEngine() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // 하늘색 배경
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
            scene.add(light);

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshLambertMaterial({color: 0x4CAF50}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            controls = new THREE.PointerLockControls(camera, document.body);
            document.body.addEventListener('click', () => { if(isPlaying) controls.lock(); });
        }

        // === 4. 게임 루프 (점프/중력) ===
        function animate() {
            requestAnimationFrame(animate);
            if(isPlaying) {
                // 중력 및 점프 물리
                velocityY -= 1.5;
                camera.position.y += velocityY * 0.1;
                if(camera.position.y < playerHeight) { camera.position.y = playerHeight; velocityY = 0; }
                renderer.render(scene, camera);
            }
        }

        // === 5. 시작 로직 ===
        function startHost() {
            initEngine();
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('gun-img').src = weapons['M4A1'].img;
            document.getElementById('viewmodel').style.display = 'block';
            isPlaying = true;
            controls.lock();
        }

        function startJoin() { alert("방 코드를 입력해주세요."); }

        // 점프 이벤트
        document.addEventListener('keydown', (e) => {
            if(e.code === 'Space' && camera.position.y <= playerHeight + 0.1) velocityY = 15;
        });

        // 윈도우 리사이즈 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
