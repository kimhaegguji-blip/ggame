<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D 웹 FPS 게임</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background-color: #000; font-family: 'Impact', sans-serif; }
        
        /* 십자선 (조준경) */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 20px; height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background-color: #00ff00;
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        /* UI 영역 */
        #ui-layer {
            position: absolute;
            top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            color: white; font-size: 30px;
            pointer-events: none; z-index: 10;
            text-shadow: 2px 2px 0 #000;
        }
        #health { color: #ff4444; }

        /* 총구 섬광 효과 */
        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 200, 0.5);
            opacity: 0; pointer-events: none; z-index: 5;
            transition: opacity 0.05s;
        }

        /* 시작 화면 */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; color: white;
        }
        #start-btn {
            margin-top: 20px; padding: 15px 40px; font-size: 24px; font-family: 'Impact', sans-serif;
            background-color: #FFCC00; border: none; cursor: pointer; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="flash"></div>
    <div id="crosshair"></div>
    
    <div id="ui-layer">
        <div id="score-display">SCORE: 0</div>
        <div id="health">HP: 100</div>
    </div>

    <div id="start-screen">
        <h1 style="font-size: 50px; color: #ff4444;">AI CUBE SHOOTER</h1>
        <p style="font-size: 20px; margin-top: 10px;">이동: W, A, S, D | 사격: 마우스 왼쪽 클릭</p>
        <button id="start-btn">게임 시작 (화면 클릭)</button>
    </div>

    <!-- Three.js 및 PointerLockControls 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // === 1. 게임 기본 설정 ===
        let score = 0;
        let hp = 100;
        let isPlaying = false;

        const scoreDisplay = document.getElementById('score-display');
        const healthDisplay = document.getElementById('health');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const flash = document.getElementById('flash');

        // === 2. 3D 씬(Scene) 구성 ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // 하늘색 배경
        scene.fog = new THREE.Fog(0x87CEEB, 0, 100); // 안개 효과

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 2; // 플레이어 눈높이

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 조명 추가
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 바닥(잔디밭) 생성
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x4CAF50 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // === 3. 적(AI) 생성 ===
        // 붉은색 큐브가 플레이어를 쫓아옵니다.
        const enemyGeo = new THREE.BoxGeometry(2, 2, 2);
        const enemyMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
        const enemy = new THREE.Mesh(enemyGeo, enemyMat);
        scene.add(enemy);

        function spawnEnemy() {
            // 플레이어 주변 무작위 위치에서 리스폰
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 20 + 15; // 15~35 거리
            enemy.position.x = camera.position.x + Math.cos(angle) * distance;
            enemy.position.z = camera.position.z + Math.sin(angle) * distance;
            enemy.position.y = 1;
        }
        spawnEnemy();

        // === 4. 조작 (PointerLock & WASD) ===
        const controls = new THREE.PointerLockControls(camera, document.body);

        startBtn.addEventListener('click', () => {
            controls.lock();
        });

        controls.addEventListener('lock', () => {
            startScreen.style.display = 'none';
            if (hp <= 0) { hp = 100; score = 0; updateUI(); spawnEnemy(); }
            isPlaying = true;
        });

        controls.addEventListener('unlock', () => {
            if (hp > 0) startScreen.style.display = 'flex';
            isPlaying = false;
        });

        const moveState = { forward: false, backward: false, left: false, right: false };
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') moveState.forward = true;
            if (e.code === 'KeyS') moveState.backward = true;
            if (e.code === 'KeyA') moveState.left = true;
            if (e.code === 'KeyD') moveState.right = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveState.forward = false;
            if (e.code === 'KeyS') moveState.backward = false;
            if (e.code === 'KeyA') moveState.left = false;
            if (e.code === 'KeyD') moveState.right = false;
        });

        // === 5. 사격 로직 (Raycaster) ===
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playGunSound() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRTime(0.01, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        const raycaster = new THREE.Raycaster();
        const center = new THREE.Vector2(0, 0);

        document.addEventListener('mousedown', () => {
            if (!isPlaying) return;

            // 1. 발사 이펙트
            playGunSound();
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 50);

            // 2. 광선(Ray)을 쏴서 적이 맞았는지 확인
            raycaster.setFromCamera(center, camera);
            const intersects = raycaster.intersectObject(enemy);

            if (intersects.length > 0) {
                // 명중!
                score += 10;
                updateUI();
                spawnEnemy(); // 적 리스폰
            }
        });

        // === 6. 게임 루프 (AI 이동 및 프레임 업데이트) ===
        const clock = new THREE.Clock();
        const speed = 15; // 플레이어 이동 속도
        const enemySpeed = 4; // AI 이동 속도

        function updateUI() {
            scoreDisplay.textContent = `SCORE: ${score}`;
            healthDisplay.textContent = `HP: ${hp}`;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isPlaying) return;

            const delta = clock.getDelta();

            // 플레이어 이동 로직
            if (moveState.forward) controls.moveForward(speed * delta);
            if (moveState.backward) controls.moveForward(-speed * delta);
            if (moveState.right) controls.moveRight(speed * delta);
            if (moveState.left) controls.moveRight(-speed * delta);

            // AI 이동 로직 (플레이어를 바라보며 전진)
            const targetPos = new THREE.Vector3(camera.position.x, enemy.position.y, camera.position.z);
            enemy.lookAt(targetPos);
            enemy.translateZ(enemySpeed * delta);

            // AI와의 충돌(피격) 판정
            const distance = enemy.position.distanceTo(camera.position);
            if (distance < 2.5) {
                // 적에게 닿으면 데미지를 입고 적 리스폰
                hp -= 20;
                updateUI();
                spawnEnemy();
                
                if (hp <= 0) {
                    controls.unlock();
                    document.getElementById('start-btn').textContent = "게임 오버! 다시 시작";
                    startScreen.style.display = 'flex';
                }
            }

            renderer.render(scene, camera);
        }

        // 화면 크기 변경 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
