<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D 웹 FPS (자체 내장 무기 그래픽 & 캐릭터 & 달리기)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background-color: #000; font-family: 'Impact', sans-serif; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; display: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background-color: #00ff00; transition: 0.2s; }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        /* 저격소총 전용 스코프 렌즈 */
        #sniper-scope { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 15%, rgba(0,0,0,0.95) 45%, black 100%); display: none; pointer-events: none; z-index: 15; justify-content: center; align-items: center; }
        #sniper-scope .line-h { position: absolute; width: 100%; height: 2px; background: rgba(255, 0, 0, 0.8); }
        #sniper-scope .line-v { position: absolute; width: 2px; height: 100%; background: rgba(255, 0, 0, 0.8); }
        #sniper-scope .center-dot { position: absolute; width: 6px; height: 6px; background: red; border-radius: 50%; }

        #ui-layer { position: absolute; top: 20px; left: 20px; right: 20px; display: none; justify-content: space-between; color: white; font-size: 30px; pointer-events: none; z-index: 10; text-shadow: 2px 2px 0 #000; }
        #ammo-display { position: absolute; bottom: 30px; right: 40px; color: #FFCC00; font-size: 40px; pointer-events: none; z-index: 10; text-shadow: 3px 3px 0 #000; display: none; }
        #health { color: #ff4444; }

        #hotbar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; gap: 15px; z-index: 10; }
        .slot { background: rgba(0,0,0,0.6); border: 2px solid #555; padding: 10px 15px; border-radius: 5px; color: #ccc; font-size: 18px; text-align: center; min-width: 100px; transition: 0.2s; }
        .slot.active { border-color: #00ff00; background: rgba(0,255,0,0.2); color: #fff; transform: scale(1.1); }
        .slot-key { font-size: 14px; color: #FFCC00; display: block; margin-bottom: 5px; }

        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 200, 0.4); opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.05s; }
        #hit-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 0, 0, 0.4); opacity: 0; pointer-events: none; z-index: 6; transition: opacity 0.1s; }
        #block-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 150, 255, 0.3); opacity: 0; pointer-events: none; z-index: 6; transition: opacity 0.1s; }

        /* 뷰모델 (직접 그린 SVG 렌더링용) */
        #viewmodel-container { position: absolute; bottom: -20px; right: 10%; width: 550px; height: 450px; pointer-events: none; z-index: 8; display: none; transition: right 0.3s ease, bottom 0.3s ease, transform 0.3s ease; }
        #weapon-img { width: 100%; height: 100%; object-fit: contain; object-position: bottom right; filter: drop-shadow(5px 15px 15px rgba(0,0,0,0.9)); transition: transform 0.05s; }
        
        body.ads #viewmodel-container { right: 50%; margin-right: -275px; bottom: 0px; transform: scale(1.3); }
        body.reloading #viewmodel-container { transform: translateY(300px) rotate(30deg); transition: transform 0.5s ease-in-out; }
        body.shooting #weapon-img { transform: translate(15px, 15px) rotate(5deg); }
        body.shielding #viewmodel-container { right: 50%; margin-right: -275px; bottom: -50px; transform: scale(1.6); }

        #coin-alert { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); font-size: 40px; color: #FFD700; text-shadow: 2px 2px 0 #000; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 20; }

        #lobby-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; color: white; overflow-y: auto; }
        .lobby-box { background: #222; padding: 25px; border-radius: 10px; border: 2px solid #444; text-align: center; width: 550px; margin-top: 50px; margin-bottom: 30px; }
        h1 { font-size: 36px; color: #00ff00; margin-bottom: 5px; }
        #coin-display { font-size: 28px; color: #FFCC00; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #555; padding-bottom: 10px; }
        .select-container { display: flex; flex-wrap: wrap; justify-content: space-between; }
        .select-group { width: 48%; margin-bottom: 12px; text-align: left; background: #333; padding: 12px; border-radius: 5px; }
        .select-group.full { width: 100%; }
        .select-group label { display: block; font-size: 14px; margin-bottom: 5px; color: #fff; font-family: sans-serif; font-weight: bold; }
        select, input { width: 100%; padding: 8px; font-size: 15px; border: none; border-radius: 5px; font-family: 'Impact', sans-serif; }
        input { text-align: center; text-transform: uppercase; margin-bottom: 10px; }
        
        button { width: 100%; padding: 12px; font-size: 20px; font-family: 'Impact', sans-serif; background-color: #FFCC00; border: none; cursor: pointer; border-radius: 5px; margin-bottom: 8px; transition: 0.2s; }
        button:hover { background-color: #e6b800; }
        .join-btn { background-color: #4CAF50; color: white; } .join-btn:hover { background-color: #45a049; }
        
        #btn-buy { background-color: #9C27B0; color: white; display: none; margin-top: 10px; }
        #btn-buy:hover { background-color: #7B1FA2; }
        #status-msg { margin-top: 10px; font-size: 14px; color: #aaa; }
        
        #pause-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 30; color: white; }
        #pause-screen button { width: 300px; margin-bottom: 15px; }

        #game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 40; color: white; }
    </style>
</head>
<body>

    <div id="flash"></div><div id="hit-flash"></div><div id="block-flash"></div>
    <div id="crosshair"></div>
    
    <div id="sniper-scope">
        <div class="line-h"></div><div class="line-v"></div><div class="center-dot"></div>
    </div>

    <div id="coin-alert">+200 COINS!</div>
    <div id="ui-layer"><div id="kill-display">KILLS: 0</div><div id="health">HP: 100</div></div>
    <div id="viewmodel-container"><img id="weapon-img" src="" alt="weapon"></div>

    <div id="hotbar">
        <div class="slot active" id="slot-1"><span class="slot-key">[1]</span>PRIMARY</div>
        <div class="slot" id="slot-2"><span class="slot-key">[2]</span>SECONDARY</div>
        <div class="slot" id="slot-3"><span class="slot-key">[3]</span>MELEE</div>
        <div class="slot" id="slot-4"><span class="slot-key">[4]</span>SPECIAL</div>
    </div>
    <div id="ammo-display">30 / 30</div>

    <div id="lobby-screen">
        <div class="lobby-box">
            <h1>BLACK MARKET</h1>
            <div id="coin-display">💰 보유 코인: 0 C</div>
            
            <div class="select-container">
                <div class="select-group">
                    <label>1. 주무기 (Primary)</label>
                    <select id="wep-primary"></select>
                </div>
                <div class="select-group">
                    <label>2. 보조무기 (Secondary)</label>
                    <select id="wep-secondary"></select>
                </div>
                <div class="select-group">
                    <label>3. 근접/방패 (Melee)</label>
                    <select id="wep-melee"></select>
                </div>
                <div class="select-group">
                    <label>4. 특수/회복 (Special)</label>
                    <select id="wep-special"></select>
                </div>
            </div>

            <div class="select-group full">
                <label>맵 투표 (방장 전용)</label>
                <select id="map-select">
                    <option value="city">도시 (빌딩 숲)</option>
                    <option value="road">도로 (차량과 바리케이드)</option>
                    <option value="mountain">산 (거대한 바위 지형)</option>
                    <option value="hill">언덕 (숲과 나무)</option>
                </select>
            </div>

            <button id="btn-buy">🔒 무기 일괄 구매 (0 C)</button>

            <div id="join-container" style="margin-top: 15px;">
                <button id="btn-host">방 만들기 (Host)</button>
                <div style="margin: 5px 0;">-- OR --</div>
                <input type="text" id="room-input" placeholder="상대방의 방 코드 4자리 입력" maxlength="4">
                <button id="btn-join" class="join-btn">코드 입력 후 참가 (Join)</button>
            </div>
            <div id="status-msg"></div>
        </div>
    </div>

    <div id="pause-screen">
        <h1 style="font-size: 50px; margin-bottom: 30px;">GAME PAUSED</h1>
        <button id="btn-resume">게임으로 돌아가기</button>
        <button id="btn-leave" style="background-color: #ff4444; color: white;">상점(로비)으로 나가기</button>
    </div>
    <div id="game-over-screen">
        <h1 style="color: #ff4444; font-size: 60px;">YOU DIED</h1>
        <p style="font-size: 20px; margin-bottom: 20px;">3초 후 부활합니다...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // === 브라우저 내장용 SVG 렌더링 함수 (절대 깨지지 않는 그래픽) ===
        function getSvgGraphic(type) {
            let s = '';
            if(type==='AR') s = `<rect x="20" y="20" width="40" height="12" fill="#2c3e50" rx="2"/><rect x="60" y="23" width="30" height="4" fill="#7f8c8d"/><polygon points="20,20 5,25 5,35 20,30" fill="#34495e"/><path d="M35,32 L38,45 L45,45 L42,32 Z" fill="#2c3e50"/><polygon points="25,32 22,42 28,42 30,32" fill="#111"/><rect x="45" y="15" width="4" height="5" fill="#111"/><rect x="75" y="19" width="2" height="4" fill="#111"/>`;
            else if(type==='SG') s = `<rect x="20" y="22" width="35" height="8" fill="#2c3e50"/><rect x="55" y="22" width="35" height="5" fill="#7f8c8d"/><rect x="55" y="27" width="25" height="3" fill="#34495e"/><rect x="50" y="26" width="15" height="5" fill="#8e44ad" rx="1"/><polygon points="20,22 5,26 5,32 20,30" fill="#8e44ad"/>`;
            else if(type==='SMG') s = `<rect x="30" y="20" width="25" height="12" fill="#34495e" rx="2"/><rect x="55" y="22" width="15" height="4" fill="#7f8c8d"/><rect x="35" y="32" width="8" height="15" fill="#111" rx="1"/><rect x="15" y="25" width="15" height="3" fill="#7f8c8d"/>`;
            else if(type==='SR') s = `<rect x="15" y="22" width="45" height="8" fill="#27ae60" rx="1"/><rect x="60" y="24" width="35" height="3" fill="#7f8c8d"/><polygon points="15,22 2,26 2,34 15,30" fill="#27ae60"/><rect x="30" y="12" width="25" height="6" fill="#111" rx="2"/><rect x="28" y="10" width="4" height="10" fill="#222"/><rect x="53" y="10" width="4" height="10" fill="#222"/><polygon points="25,30 22,38 28,38 29,30" fill="#111"/>`;
            else if(type==='PISTOL') s = `<rect x="40" y="15" width="30" height="8" fill="#7f8c8d" rx="1"/><rect x="40" y="23" width="30" height="4" fill="#2c3e50"/><polygon points="42,27 38,40 46,40 48,27" fill="#111"/><rect x="50" y="27" width="8" height="5" fill="none" stroke="#111" stroke-width="2"/>`;
            else if(type==='KNIFE') s = `<polygon points="50,25 80,25 75,20 50,20" fill="#bdc3c7"/><rect x="30" y="20" width="20" height="5" fill="#8e44ad" rx="1"/><rect x="48" y="18" width="4" height="9" fill="#111"/>`;
            else if(type==='KATANA') s = `<path d="M30,25 Q60,35 90,20 Q60,30 30,22 Z" fill="#bdc3c7"/><rect x="10" y="22" width="20" height="4" fill="#c0392b" rx="1"/><rect x="28" y="19" width="4" height="10" fill="#f1c40f"/>`;
            else if(type==='SHIELD') s = `<rect x="30" y="5" width="40" height="40" rx="5" fill="#2c3e50"/><rect x="35" y="10" width="30" height="10" rx="2" fill="#3498db" opacity="0.8"/><rect x="35" y="25" width="30" height="15" fill="#34495e" rx="2"/>`;
            else if(type==='MEDKIT') s = `<rect x="30" y="15" width="40" height="25" rx="3" fill="#ecf0f1"/><rect x="46" y="20" width="8" height="15" fill="#e74c3c" rx="1"/><rect x="42.5" y="23.5" width="15" height="8" fill="#e74c3c" rx="1"/><path d="M40,15 L40,10 L60,10 L60,15" fill="none" stroke="#bdc3c7" stroke-width="3"/>`;
            else if(type==='RPG') s = `<rect x="10" y="22" width="60" height="8" fill="#556b2f" rx="1"/><polygon points="10,22 5,18 5,34 10,26" fill="#333"/><polygon points="70,22 90,26 70,30" fill="#27ae60"/><rect x="30" y="30" width="4" height="10" fill="#111"/><rect x="45" y="30" width="4" height="10" fill="#111"/>`;
            else if(type==='LASER') s = `<rect x="25" y="20" width="40" height="12" fill="#ecf0f1" rx="4"/><rect x="65" y="24" width="20" height="4" fill="#3498db" rx="1"/><rect x="35" y="25" width="20" height="2" fill="#00ffff"/><polygon points="30,32 25,42 33,42 38,32" fill="#bdc3c7"/><rect x="68" y="22" width="2" height="8" fill="#2980b9"/><rect x="74" y="22" width="2" height="8" fill="#2980b9"/>`;
            else if(type==='STIMPACK') s = `<rect x="45" y="10" width="10" height="25" fill="#bdc3c7" rx="2"/><rect x="47" y="12" width="6" height="20" fill="#2ecc71"/><rect x="49" y="35" width="2" height="10" fill="#bdc3c7"/><rect x="40" y="8" width="20" height="4" fill="#7f8c8d" rx="1"/>`;

            const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50">${s}</svg>`;
            return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svgStr)}`;
        }

        let myCoins = parseInt(localStorage.getItem('fps_coins')) || 0;
        let unlockedWeapons = JSON.parse(localStorage.getItem('fps_unlocked')) || ['AR', 'GLOCK', 'KNIFE', 'MEDKIT'];
        if (!unlockedWeapons.includes('MEDKIT')) unlockedWeapons.push('MEDKIT');

        function saveData() { localStorage.setItem('fps_coins', myCoins); localStorage.setItem('fps_unlocked', JSON.stringify(unlockedWeapons)); }

        let peer = null; let conn = null; let isPlaying = false;
        let hp = 100; let kills = 0;
        let isReloading = false; let isAiming = false; let isMouseDown = false; let lastFireTime = 0;
        let swayX = 0; let swayY = 0; 
        
        let velocityY = 0; let canJump = true; let isSprinting = false; 
        const gravity = 35.0; const jumpStrength = 13.0; const playerHeight = 2.0; 
        const baseSpeed = 15; const sprintSpeed = 26; 

        const db = {
            primary: {
                'AR': { name: 'M4A1', desc: 'M4A1 (밸런스 소총)', type: 'auto', maxAmmo: 30, ammo: 30, dmg: 15, delay: 120, range: 100, fov: 45, price: 0, img: getSvgGraphic('AR') },
                'SG': { name: 'SHOTGUN', desc: '산탄총 (근접 파괴)', type: 'semi', maxAmmo: 8, ammo: 8, dmg: 45, delay: 800, range: 25, fov: 60, price: 2000, img: getSvgGraphic('SG') },
                'SMG': { name: 'SMG', desc: '기관단총 (P90)', type: 'auto', maxAmmo: 40, ammo: 40, dmg: 12, delay: 70, range: 60, fov: 50, price: 3000, img: getSvgGraphic('SMG') },
                'AK47': { name: 'AK-47', desc: 'AK-47 (강력한 반동)', type: 'auto', maxAmmo: 30, ammo: 30, dmg: 22, delay: 150, range: 100, fov: 45, price: 5000, img: getSvgGraphic('AR') },
                'LMG': { name: 'M249', desc: 'M249 (100발 탄막)', type: 'auto', maxAmmo: 100, ammo: 100, dmg: 16, delay: 100, range: 100, fov: 50, price: 8000, img: getSvgGraphic('AR') },
                'SR': { name: 'SNIPER', desc: 'AWP (저격 끝판왕)', type: 'semi', maxAmmo: 5, ammo: 5, dmg: 80, delay: 1500, range: 300, fov: 15, price: 12000, img: getSvgGraphic('SR') }
            },
            secondary: {
                'GLOCK': { name: 'GLOCK', desc: '글록 (기본 권총)', type: 'semi', maxAmmo: 15, ammo: 15, dmg: 18, delay: 180, range: 80, fov: 55, price: 0, img: getSvgGraphic('PISTOL') },
                'MAC10': { name: 'MAC-10', desc: '우지 (연사 권총)', type: 'auto', maxAmmo: 30, ammo: 30, dmg: 12, delay: 80, range: 50, fov: 55, price: 2000, img: getSvgGraphic('SMG') },
                'REVOLVER': { name: 'REVOLVER', desc: '리볼버 (안정적 한방)', type: 'semi', maxAmmo: 6, ammo: 6, dmg: 35, delay: 450, range: 100, fov: 45, price: 4000, img: getSvgGraphic('PISTOL') },
                'DEAGLE': { name: 'D-EAGLE', desc: '데저트 이글 (손대포)', type: 'semi', maxAmmo: 7, ammo: 7, dmg: 45, delay: 500, range: 100, fov: 50, price: 6000, img: getSvgGraphic('PISTOL') }
            },
            melee: {
                'KNIFE': { name: 'KNIFE', desc: '전투 단검 (기본)', type: 'melee', maxAmmo: '∞', ammo: '∞', dmg: 60, delay: 500, range: 5, price: 0, img: getSvgGraphic('KNIFE') },
                'SHIELD': { name: 'SHIELD', desc: '전술 방패 (5회 방어)', type: 'melee_shield', maxAmmo: '∞', ammo: '∞', dmg: 30, delay: 700, range: 4, blockCharges: 5, maxBlocks: 5, blockCooldown: 2500, lastBlockTime: 0, price: 5000, img: getSvgGraphic('SHIELD') },
                'KATANA': { name: 'KATANA', desc: '카타나 (원샷원킬)', type: 'melee', maxAmmo: '∞', ammo: '∞', dmg: 100, delay: 800, range: 8, price: 8000, img: getSvgGraphic('KATANA') }
            },
            special: {
                'MEDKIT': { name: 'MEDKIT', desc: '구급상자 (HP 40 회복)', type: 'heal', maxAmmo: '∞', ammo: '∞', heal: 40, cooldown: 10000, lastUse: 0, price: 0, img: getSvgGraphic('MEDKIT') },
                'STIMPACK': { name: 'STIMPACK', desc: '아드레날린 주사기', type: 'heal', maxAmmo: '∞', ammo: '∞', heal: 100, cooldown: 15000, lastUse: 0, price: 4000, img: getSvgGraphic('STIMPACK') },
                'RPG': { name: 'RPG', desc: '로켓 런처 (즉사 파괴력)', type: 'semi', maxAmmo: 1, ammo: 1, dmg: 150, delay: 1000, range: 250, fov: 60, price: 15000, img: getSvgGraphic('RPG') },
                'LASER': { name: 'LASER', desc: '외계 레이저건 (초월 무기)', type: 'auto', maxAmmo: 100, ammo: 100, dmg: 25, delay: 50, range: 300, fov: 40, price: 25000, img: getSvgGraphic('LASER') }
            }
        };

        const weapons = { 1: null, 2: null, 3: null, 4: null };
        let currentWeapon = 1;

        const lobbyScreen = document.getElementById('lobby-screen'); const statusMsg = document.getElementById('status-msg');
        const coinDisplay = document.getElementById('coin-display'); const healthDisplay = document.getElementById('health'); 
        const killDisplay = document.getElementById('kill-display'); const ammoDisplay = document.getElementById('ammo-display'); 
        const hotbar = document.getElementById('hotbar'); const crosshair = document.getElementById('crosshair'); 
        const uiLayer = document.getElementById('ui-layer'); const viewmodelContainer = document.getElementById('viewmodel-container'); 
        const weaponImg = document.getElementById('weapon-img'); const pauseScreen = document.getElementById('pause-screen');
        const sniperScope = document.getElementById('sniper-scope');

        function populateSelects() {
            ['primary', 'secondary', 'melee', 'special'].forEach(category => {
                const select = document.getElementById(`wep-${category}`); select.innerHTML = '';
                for (const key in db[category]) {
                    const w = db[category][key]; const isUnlocked = unlockedWeapons.includes(key);
                    const opt = document.createElement('option'); opt.value = key; opt.textContent = isUnlocked ? w.desc : `[🔒 ${w.price} C] ` + w.desc; select.appendChild(opt);
                }
                select.addEventListener('change', updateLobbyUI);
            });
            updateLobbyUI();
        }

        function updateLobbyUI() {
            coinDisplay.textContent = `💰 보유 코인: ${myCoins} C`;
            let totalCost = 0; let buyTargets = [];
            ['primary', 'secondary', 'melee', 'special'].forEach(cat => {
                const key = document.getElementById(`wep-${cat}`).value;
                if(!unlockedWeapons.includes(key)) { totalCost += db[cat][key].price; buyTargets.push(key); }
            });
            const btnBuy = document.getElementById('btn-buy'); const joinContainer = document.getElementById('join-container');
            if (totalCost > 0) {
                btnBuy.style.display = 'block'; joinContainer.style.display = 'none'; btnBuy.textContent = `🔒 ${totalCost} 코인으로 잠금 해제`;
                btnBuy.onclick = () => {
                    if (myCoins >= totalCost) {
                        myCoins -= totalCost; unlockedWeapons.push(...buyTargets); saveData();
                        populateSelects(); alert("무기가 해금되었습니다!");
                    } else { alert(`코인이 부족합니다! (필요: ${totalCost} / 보유: ${myCoins})`); }
                };

            if (otherPlayerMesh.userData.leftLeg) {
                const ud = otherPlayerMesh.userData; const dist = otherPlayerMesh.position.distanceTo(ud.prevPos || otherPlayerMesh.position); ud.prevPos = otherPlayerMesh.position.clone();
                if (dist > 0.05) ud.walkTime += delta * 15; else ud.walkTime = 0; 
                const swing = Math.sin(ud.walkTime) * 0.6; ud.leftLeg.rotation.x = swing; ud.rightLeg.rotation.x = -swing; ud.leftArm.rotation.x = -swing; ud.rightArm.rotation.x = swing;
            }

            networkTick++;
            if(conn && conn.open && networkTick % 2 === 0) {
                const euler = new THREE.Euler(0, 0, 0, 'YXZ'); euler.setFromQuaternion(camera.quaternion);
                conn.send({ type: 'pos', x: camera.position.x, y: camera.position.y, z: camera.position.z, ry: euler.y });
            }
            renderer.render(scene, camera);
        }

        // [수정 3] 게임 도중 다른 탭(화면)으로 넘어갔을 때 조준 및 사격 상태 강제 초기화
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isAiming = false;
                isMouseDown = false;
                isSprinting = false;
                moveState.forward = false; moveState.backward = false;
                moveState.left = false; moveState.right = false;
                document.body.classList.remove('ads');
                resetScopeUI(); // 스나이퍼 까만 화면 해제
            }
        });

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
