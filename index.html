<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>간단한 2D 사격 게임</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* 화면 스크롤 및 줌 차단 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* 게임 화면 컨테이너 */
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            max-width: 100vw;
            max-height: 100vh;
            background-color: #78B159; /* 초록색 잔디밭 느낌 */
            border: 4px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            cursor: crosshair; /* PC용 조준경 커서 */
        }

        /* 점수 및 타이머 표시 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none; /* 클릭 방해 금지 */
            z-index: 10;
        }

        .ui-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }

        /* 빨간색 사격 과녁 */
        #target {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #FF4B4B;
            border: 10px double white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none; /* 시작 전엔 숨김 */
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent; /* 모바일 터치 깜빡임 방지 */
        }

        /* 게임 오버 / 시작 화면 대기실 */
        #screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        #screen-title {
            color: white;
            font-size: 32px;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background-color: #FFCC00;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #cc9900;
            -webkit-tap-highlight-color: transparent;
        }

        #start-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #cc9900;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="score-display" class="ui-text">점수: 0</div>
            <div id="time-display" class="ui-text">남은 시간: 30s</div>
        </div>

        <div id="target"></div>

        <div id="screen-overlay">
            <div id="screen-title">사격 게임<br><span style="font-size: 16px; color: #ccc;">30초 동안 과녁을 터치하세요!</span></div>
            <button id="start-btn">게임 시작</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score-display');
        const timeDisplay = document.getElementById('time-display');
        const screenOverlay = document.getElementById('screen-overlay');
        const screenTitle = document.getElementById('screen-title');
        const startBtn = document.getElementById('start-btn');

        let score = 0;
        let timeLeft = 30;
        let gameInterval = null;
        let targetInterval = null;
        let isPlaying = false;

        function startGame() {
            score = 0;
            timeLeft = 30;
            isPlaying = true;
            
            scoreDisplay.textContent = `점수: ${score}`;
            timeDisplay.textContent = `남은 시간: ${timeLeft}s`;
            screenOverlay.style.display = 'none';
            
            moveTarget();
            target.style.display = 'block';
            
            gameInterval = setInterval(updateTimer, 1000);
            targetInterval = setInterval(moveTarget, 1500);
        }

        function updateTimer() {
            timeLeft--;
            timeDisplay.textContent = `남은 시간: ${timeLeft}s`;
            if (timeLeft <= 0) {
                endGame();
            }
        }

        function moveTarget() {
            if (!isPlaying) return;

            const rect = gameContainer.getBoundingClientRect();
            const padding = 50; // 과녁이 화면 모서리에 딱 붙지 않게 여백 설정
            
            // 패널의 실제 픽셀 크기를 기준으로 랜덤 좌표 생성
            const randomX = Math.random() * (rect.width - padding * 2) + padding;
            const randomY = Math.random() * (rect.height - padding * 2) + padding;

            // 백분율(%)로 변환하여 CSS 포지셔닝 적용
            target.style.left = `${(randomX / rect.width) * 100}%`;
            target.style.top = `${(randomY / rect.height) * 100}%`;
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(targetInterval);
            target.style.display = 'none';
            
            screenTitle.innerHTML = `게임 오버!<br><span style="color: #FFCC00; font-size: 36px;">최종 점수: ${score}점</span>`;
            startBtn.textContent = '다시 시작';
            screenOverlay.style.display = 'flex';
        }

        // 모바일 터치와 PC 마우스 클릭을 모두 안전하게 지원하는 이벤트 리스너
        function hitTarget(e) {
            if (e) e.preventDefault(); // 기본 터치 동작(스크롤 등) 방지
            if (!isPlaying) return;

            score += 10;
            scoreDisplay.textContent = `점수: ${score}`;
            
            clearInterval(targetInterval);
            moveTarget();
            targetInterval = setInterval(moveTarget, 1500);
        }

        // 구형 기기 및 다양한 브라우저 호환성을 위해 멀티 이벤트 등록
        target.addEventListener('touchstart', hitTarget, { passive: false });
        target.addEventListener('mousedown', hitTarget);

        // 시작 버튼 이벤트
        startBtn.addEventListener('click', startGame);
        startBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        }, { passive: false });
    </script>
</body>
</html>
