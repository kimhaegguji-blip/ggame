<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>리얼 사격 게임</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Impact', sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            max-width: 100vw;
            max-height: 100vh;
            background-color: #4CAF50;
            border: 6px solid #333;
            border-radius: 5px;
            overflow: hidden;
            cursor: crosshair;
            transition: transform 0.05s; /* 반동 애니메이션을 위한 설정 */
        }

        /* 총을 쐈을 때 화면이 흔들리는 반동 효과 */
        .shake {
            transform: translate(5px, 5px) scale(1.02);
        }

        /* 총구 섬광 (화면이 번쩍이는 효과) */
        #flash {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(255, 255, 200, 0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            transition: opacity 0.05s;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .ui-text {
            color: white;
            font-size: 28px;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 2px;
        }

        #target {
            position: absolute;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, red 20%, white 21%, white 40%, red 41%, red 60%, white 61%, white 80%, red 81%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 2px 5px 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        #screen-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        #screen-title {
            color: #FF4B4B;
            font-size: 40px;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 3px 3px 0 #fff;
        }

        #start-btn {
            padding: 15px 50px;
            font-size: 24px;
            font-family: 'Impact', sans-serif;
            color: #000;
            background-color: #FFCC00;
            border: 4px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 6px 0 #B38F00;
            transition: 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        #start-btn:active {
            transform: translateY(6px);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="flash"></div> <!-- 섬광 효과용 요소 -->
        <div id="ui-layer">
            <div id="score-display" class="ui-text">SCORE: 0</div>
            <div id="time-display" class="ui-text">TIME: 30</div>
        </div>

        <div id="target"></div>

        <div id="screen-overlay">
            <div id="screen-title">SNIPER TRAINING<br><span style="font-size: 20px; color: #ccc; text-shadow: none;">화면을 탭하여 사격하세요!</span></div>
            <button id="start-btn">START</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score-display');
        const timeDisplay = document.getElementById('time-display');
        const screenOverlay = document.getElementById('screen-overlay');
        const screenTitle = document.getElementById('screen-title');
        const startBtn = document.getElementById('start-btn');
        const flash = document.getElementById('flash');

        let score = 0;
        let timeLeft = 30;
        let gameInterval = null;
        let targetInterval = null;
        let isPlaying = false;
        
        // 웹 오디오 API 설정 (총소리용)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 총소리 발생 함수 (파일 없이 코드로 소리 생성)
        function playGunSound() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 총 쏘는 효과 (화면 흔들림 & 섬광)
        function triggerShootEffect() {
            // 소리 재생
            playGunSound();
            
            // 섬광 켜기
            flash.style.opacity = '1';
            
            // 화면 흔들기
            gameContainer.classList.add('shake');
            
            // 0.05초 뒤에 원상복구
            setTimeout(() => {
                flash.style.opacity = '0';
                gameContainer.classList.remove('shake');
            }, 50);
        }

        function startGame() {
            // 오디오 컨텍스트 초기화 (브라우저 정책상 사용자 인터랙션 시 활성화 필요)
            if(audioCtx.state === 'suspended') audioCtx.resume();

            score = 0;
            timeLeft = 30;
            isPlaying = true;
            
            scoreDisplay.textContent = `SCORE: ${score}`;
            timeDisplay.textContent = `TIME: ${timeLeft}`;
            
            screenOverlay.style.display = 'none';
            target.style.display = 'block';
            
            clearInterval(gameInterval);
            clearInterval(targetInterval);
            
            moveTarget();
            gameInterval = setInterval(updateTimer, 1000);
            targetInterval = setInterval(moveTarget, 1200); // 난이도 약간 상승 (1.2초)
        }

        function updateTimer() {
            timeLeft--;
            timeDisplay.textContent = `TIME: ${timeLeft}`;
            if (timeLeft <= 0) endGame();
        }

        function moveTarget() {
            if (!isPlaying) return;

            let width = gameContainer.clientWidth || window.innerWidth;
            let height = gameContainer.clientHeight || window.innerHeight;

            const randomX = Math.random() * (85 - 15) + 15; 
            const randomY = Math.random() * (85 - 15) + 15; 

            target.style.left = `${randomX}%`;
            target.style.top = `${randomY}%`;
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(targetInterval);
            target.style.display = 'none';
            
            screenTitle.innerHTML = `MISSION COMPLETE<br><span style="color: #fff; font-size: 40px; text-shadow: 2px 2px 0 #000;">FINAL SCORE: ${score}</span>`;
            startBtn.textContent = 'RESTART';
            screenOverlay.style.display = 'flex';
        }

        // 과녁을 맞췄을 때
        function hitTarget(e) {
            if (!isPlaying) return;
            if(e) { e.stopPropagation(); if(e.cancelable) e.preventDefault(); }

            score += 10;
            scoreDisplay.textContent = `SCORE: ${score}`;
            
            // 명중했을 때는 더 빨리 다음 과녁이 나오도록 처리
            clearInterval(targetInterval);
            moveTarget();
            targetInterval = setInterval(moveTarget, 1200);
        }

        // 화면 어디든 누르면 총 쏘는 효과 발생 (허공에 쏴도 소리와 반동 적용)
        gameContainer.addEventListener('pointerdown', (e) => {
            if (isPlaying) triggerShootEffect();
        });

        // 과녁 터치 이벤트 (이벤트 버블링을 통해 부모의 반동 효과도 같이 실행됨)
        target.addEventListener('pointerdown', hitTarget);

        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
