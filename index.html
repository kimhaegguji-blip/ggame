<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Ultimate PvP FPS - Final Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background-color: #000; font-family: 'Impact', sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; display: none; border: 2px solid #00ff00; border-radius: 50%; }
        #sniper-scope { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 15%, black 45%); display: none; z-index: 15; justify-content: center; align-items: center; pointer-events: none; }
        #ui-layer { position: absolute; top: 20px; left: 20px; right: 20px; display: none; justify-content: space-between; color: white; font-size: 30px; pointer-events: none; z-index: 10; }
        #viewmodel-container { position: absolute; bottom: 0; right: 10%; width: 500px; height: 400px; pointer-events: none; z-index: 8; display: none; }
        #weapon-img { width: 100%; height: 100%; object-fit: contain; object-position: bottom right; }
        #lobby-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; justify-content: center; align-items: center; z-index: 20; color: white; }
        .lobby-box { background: #222; padding: 30px; border-radius: 10px; width: 500px; text-align: center; }
        button { width: 100%; padding: 15px; background: #FFCC00; border: none; cursor: pointer; font-size: 20px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="sniper-scope"><div style="width:100%; height:2px; background:red;"></div><div style="width:2px; height:100%; background:red; position:absolute;"></div></div>
    <div id="ui-layer"><div id="kill-display">KILLS: 0</div><div id="health">HP: 100</div></div>
    <div id="viewmodel-container"><img id="weapon-img" src="" alt="weapon"></div>
    <div id="lobby-screen">
        <div class="lobby-box">
            <h1>ULTIMATE PvP FPS</h1>
            <button onclick="startGameDirectly()">게임 시작</button>
        </div>
    </div>
    <script>
        // 1. 씬 설정 (검은 화면 방지용 Alpha 설정)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. 기본 조명
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
        scene.add(light);

        // 3. 게임 실행
        let isPlaying = false;
        function startGameDirectly() {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('crosshair').style.display = 'block';
            isPlaying = true;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPlaying) {
                renderer.render(scene, camera);
            }
        }
        animate();
    </script>
</body>
</html>
